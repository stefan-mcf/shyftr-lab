name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: python -m pip install -e ".[dev,service]"
      - name: Run tests
        run: python -m pytest -q
      - name: CLI help smoke
        run: python -m shyftr.cli --help >/dev/null

  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Check stale terminology
        run: python scripts/terminology_inventory.py --fail-on-public-stale
      - name: Check prose terminology
        run: python scripts/terminology_inventory.py --fail-on-capitalized-prose
      - name: Check public readiness
        run: python scripts/public_readiness_check.py
      - name: Check whitespace
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin main
            git diff --check origin/main...HEAD
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

  smoke:
    needs: [python-test, quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: python -m pip install -e ".[dev,service]"
      - name: Run local lifecycle
        run: bash examples/run-local-lifecycle.sh

  console-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/console
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/console/package-lock.json
      - name: Install console dependencies
        run: npm ci
      - name: Prepare console env
        run: test -f .env || cp .env.example .env
      - name: Build console
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev
